<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SupportDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-500 rounded-2xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">SupportDesk</h1>
      <p class="text-slate-400 text-sm mt-1">Create your account</p>
    </div>

    <div class="bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700">
      <h2 class="text-lg font-semibold text-white mb-6">Sign up</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-900/50 text-red-300 border border-red-700
            {% else %}bg-green-900/50 text-green-300 border border-green-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Full Name</label>
          <input type="text" name="name" required placeholder="John Doe"
            class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="you@example.com"
            class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="Min. 6 characters"
            class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2">
          Create Account
        </button>
      </form>

      <p class="text-center text-slate-400 text-sm mt-6">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
